{% extends "base.html" %}

{% block title %}Reset Password - RetroQuest{% endblock %}

{% block content %}
<div class="pixel-auth-container">
    <div class="falling-coins">
        <div class="coin coin1">&#8383;</div>
        <div class="coin coin2">&#8383;</div>
        <div class="coin coin3">&#8383;</div>
        <div class="coin coin4">&#8383;</div>
        <div class="coin coin5">&#8383;</div>
        <div class="coin coin6">&#8383;</div>
        <div class="coin coin7">&#8383;</div>
        <div class="coin coin8">&#8383;</div>
        <div class="coin coin9">&#8383;</div>
        <div class="coin coin10">&#8383;</div>
        <div class="coin coin11">&#8383;</div>
        <div class="coin coin12">&#8383;</div>
    </div>

    <div class="pixel-auth-frame">
        <div class="pixel-logo">
            <span class="logo-text">TNNO</span>
        </div>

        <h1 class="pixel-title">NEW PASSWORD<span>.</span></h1>
        <p class="pixel-text pixel-text-muted" style="margin-bottom: 14px;">
            Enter your reset code and choose a stronger password.
        </p>

        <form method="POST" action="{{ url_for('auth.reset_password') }}" data-turbo="false">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <input
                type="text"
                id="identifier"
                name="identifier"
                class="pixel-input"
                placeholder="Username or email"
                required
                style="text-transform: none;"
            >

            <input
                type="text"
                id="otp_code"
                name="otp_code"
                class="pixel-input"
                placeholder="6-digit security code"
                maxlength="6"
                inputmode="numeric"
                pattern="[0-9]{6}"
                required
            >

            <input
                type="password"
                id="password"
                name="password"
                class="pixel-input"
                placeholder="New password"
                required
                minlength="8"
            >

            <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                class="pixel-input"
                placeholder="Confirm new password"
                required
            >

            <button type="submit" class="pixel-btn pixel-btn-primary">
                UPDATE PASSWORD
            </button>
        </form>

        <div class="pixel-text-center pixel-mt-md">
            <p class="pixel-text pixel-text-muted">
                NEED A CODE?
                <a href="{{ url_for('auth.forgot_password') }}" class="pixel-link">SEND ONE</a>
            </p>
            <p class="pixel-text pixel-text-muted">
                BACK TO LOGIN:
                <a href="{{ url_for('auth.login') }}" class="pixel-link">SIGN IN</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
