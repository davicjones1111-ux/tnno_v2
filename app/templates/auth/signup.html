{% extends "base.html" %}

{% block title %}Register - RetroQuest{% endblock %}

{% block content %}
<div class="pixel-auth-container">
    <!-- Falling TNNO Animation -->
    <div class="falling-coins">
        <div class="coin coin1">&#8383;</div>
        <div class="coin coin2">&#8383;</div>
        <div class="coin coin3">&#8383;</div>
        <div class="coin coin4">&#8383;</div>
        <div class="coin coin5">&#8383;</div>
        <div class="coin coin6">&#8383;</div>
        <div class="coin coin7">&#8383;</div>
        <div class="coin coin8">&#8383;</div>
        <div class="coin coin9">&#8383;</div>
        <div class="coin coin10">&#8383;</div>
        <div class="coin coin11">&#8383;</div>
        <div class="coin coin12">&#8383;</div>
    </div>

    <div class="pixel-auth-frame">
        <!-- TNNO Logo -->
        <div class="pixel-logo">
            <span class="logo-text">TNNO</span>
        </div>

        <h1 class="pixel-title">
            CREATE ACCOUNT<span>.</span>
        </h1>

        <form method="POST" action="{{ url_for('auth.signup') }}" data-turbo="false" id="signup-form" data-check-username-url="{{ url_for('auth.check_username') }}" data-min-password-length="8">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="text" id="username" name="username" class="pixel-input"
                   placeholder="Choose a username" required minlength="3" style="text-transform: none;">
            <p id="username-message" class="pixel-text pixel-text-sm" style="margin-top: 5px;"></p>

            <input type="email" id="email" name="email" class="pixel-input"
                   placeholder="your@email.com" style="text-transform: none;">

            <input type="password" id="password" name="password" class="pixel-input"
                   placeholder="Create a password (min 8 characters)" required minlength="8" style="text-transform: none;">

            <input type="password" id="confirm_password" name="confirm_password" class="pixel-input"
                   placeholder="Confirm your password" required style="text-transform: none;">

            <button type="submit" class="pixel-btn pixel-btn-primary" id="signup-submit">
                CREATE ACCOUNT
            </button>
        </form>

        <div class="pixel-text-center pixel-mt-md">
            <p class="pixel-text pixel-text-muted">
                ALREADY HAVE AN ACCOUNT?
                <a href="{{ url_for('auth.login') }}" class="pixel-link">SIGN IN</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="{{ asset_url('js/auth-signup.js') }}"></script>
{% endblock %}
